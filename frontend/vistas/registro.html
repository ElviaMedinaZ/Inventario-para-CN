<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISC | Registro de Colaborador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen font-['Plus_Jakarta_Sans'] p-6">
    <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md transform transition-all">
        <div class="text-center mb-8">
            <div class="bg-emerald-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/30">
                <i class="fas fa-user-plus text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Nueva Cuenta</h1>
            <p class="text-slate-400 font-bold text-sm mt-2 uppercase tracking-widest">Únete al equipo SISC</p>
        </div>

        <div class="space-y-4">
            <input type="text" id="reg-nombre" placeholder="Nombre completo" class="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-emerald-500 outline-none font-bold transition-all">
            
            <input type="email" id="reg-email" placeholder="Correo institucional" class="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-emerald-500 outline-none font-bold transition-all">
            
            <input type="password" id="reg-pass" placeholder="Crea una contraseña" class="w-full p-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-emerald-500 outline-none font-bold transition-all">
            
            <div class="px-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Rol Asignado</label>
                <select id="reg-rol" class="w-full p-4 mt-1 bg-slate-50 border-2 border-transparent rounded-2xl focus:border-emerald-500 outline-none font-bold text-slate-700 transition-all">
                    <option value="Consultor">Consultor (Solo lectura)</option>
                    <option value="Editor">Editor (Gestión de Stock)</option>
                    <option value="Administrador">Administrador (Control Total)</option>
                </select>
            </div>

            <button onclick="registrar()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-slate-800 shadow-xl shadow-slate-200 transition-all mt-4">Crear mi Cuenta</button>
        </div>
        
        <p class="text-center mt-8 text-sm font-bold text-slate-400">
            ¿Ya tienes acceso? <a href="/login" class="text-emerald-600 hover:underline">Inicia sesión</a>
        </p>
    </div>

    <script>
        async function registrar() {
            const nombre = document.getElementById('reg-nombre').value;
            const correo = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const rol = document.getElementById('reg-rol').value;

            if(!nombre || !correo || !password) return alert("Por favor, completa todos los campos.");

            const res = await fetch('http://localhost:3000/auth/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, correo, password, rol })
            });

            const data = await res.json();
            if (data.success) {
                alert("¡Registro exitoso! Ya puedes iniciar sesión.");
                window.location.href = '/login';
            } else {
                alert("Error: " + (data.error || "No se pudo completar el registro"));
            }
        }
    </script>
</body>
</html>
