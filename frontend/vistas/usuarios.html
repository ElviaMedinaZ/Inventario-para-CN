<div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="p-8 border-b border-slate-50 flex justify-between items-center">
        <h3 class="font-black text-slate-800 text-xl tracking-tight">Colaboradores</h3>
        <button onclick="abrirModalUsuario()" class="bg-slate-800 text-white px-6 py-3 rounded-2xl text-sm font-black shadow-lg hover:bg-slate-700 transition">
            + Añadir Colaborador
        </button>
    </div>
    <table class="w-full text-left">
        <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black tracking-widest border-b">
            <tr>
                <th class="p-6">Perfil</th>
                <th class="p-6">Nombre</th>
                <th class="p-6">Correo</th>
                <th class="p-6">Rol</th>
                <th class="p-6 text-center">Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-usuarios"></tbody>
    </table>
</div>

<div id="modal-usuario" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center p-6 z-[110]">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
        <h3 class="text-xl font-black mb-6">Nuevo Colaborador</h3>
        <div class="space-y-4">
            <input type="text" id="user_nombre" placeholder="Nombre completo" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500">
            <input type="email" id="user_correo" placeholder="Correo electrónico" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500">
            <select id="user_rol" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500">
                <option value="Almacenista">Almacenista</option>
                <option value="Administrador">Administrador</option>
            </select>
        </div>
        <div class="mt-8 flex space-x-3">
            <button onclick="cerrarModalUsuario()" class="flex-1 font-bold text-slate-400">Cancelar</button>
            <button onclick="guardarUsuario()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">Registrar</button>
        </div>
    </div>
</div>
