<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISC Modular | Gestión de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .nav-active { background-color: #1e293b; color: white; border-right: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-900">
    <aside class="w-72 bg-slate-900 text-slate-400 flex flex-col shadow-2xl z-20">
        <div class="p-8 text-white flex items-center space-x-3 border-b border-slate-800/50">
            <div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-layer-group text-white text-lg"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tight">SISC Modular</span>
        </div>
        <nav class="flex-1 px-4 py-8 space-y-2">
            <button onclick="loadView('dashboard')" id="btn-dashboard" class="nav-btn w-full flex items-center p-4 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-200 group">
                <i class="fas fa-chart-pie mr-4 text-slate-500 group-hover:text-blue-400"></i>
                <span class="font-semibold">Dashboard</span>
            </button>
            <button onclick="loadView('inventario')" id="btn-inventario" class="nav-btn w-full flex items-center p-4 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-200 group">
                <i class="fas fa-boxes-stacked mr-4 text-slate-500 group-hover:text-blue-400"></i>
                <span class="font-semibold">Inventario</span>
            </button>
            <button onclick="loadView('usuarios')" id="btn-usuarios" class="nav-btn w-full flex items-center p-4 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-200 group">
                <i class="fas fa-user-gear mr-4 text-slate-500 group-hover:text-blue-400"></i>
                <span class="font-semibold">Usuarios</span>
            </button>
            <button onclick="loadView('reportes')" id="btn-reportes" class="nav-btn w-full flex items-center p-4 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-200 group">
                <i class="fas fa-file-invoice-dollar mr-4 text-slate-500 group-hover:text-blue-400"></i>
                <span class="font-semibold">Reportes</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-800/50">
            <div class="bg-slate-800/50 rounded-2xl p-4 flex items-center">
                <div class="w-10 h-10 bg-blue-500/10 text-blue-400 rounded-full flex items-center justify-center font-black mr-3">EY</div>
                <div>
                    <p class="text-xs font-bold text-white leading-none">Elvia Yolanda</p>
                    <p class="text-[10px] text-slate-500 mt-1 uppercase">Ingeniería IDS</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-50">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-100 flex items-center justify-between px-10">
            <h2 id="view-title" class="text-2xl font-extrabold text-slate-800 tracking-tight capitalize">Dashboard</h2>
            <p class="text-sm font-bold text-slate-400">Abril 2026</p>
        </header>
        <div id="content-area" class="flex-1 overflow-y-auto p-10 space-y-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center p-6 z-[100]">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-8 border-b flex justify-between items-center">
                <h3 class="text-xl font-black text-slate-800">Nuevo Producto</h3>
                <button onclick="toggleModal()" class="text-slate-300 hover:text-slate-500"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <input type="text" id="nombre_prod" placeholder="Nombre del producto" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none focus:border-blue-500 transition-all font-semibold">
                <input type="number" id="stock_prod" placeholder="Stock" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl outline-none focus:border-blue-500 transition-all font-semibold">
            </div>
            <div class="p-8 bg-slate-50 flex space-x-3">
                <button onclick="toggleModal()" class="flex-1 py-4 text-slate-400 font-bold">Cancelar</button>
                <button onclick="guardarProducto()" class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all">Guardar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
