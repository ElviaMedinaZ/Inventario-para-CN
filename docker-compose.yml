services:
  db:
    image: mysql:8.0
    container_name: inventario_mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./inventario_backup.sql:/docker-entrypoint-initdb.d/inventario_backup.sql

  backend:
    build: ./backend
    container_name: inventario_backend
    restart: always
    env_file:
      - .env
    ports:
      - "${APP_PORT}:3000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - db
    volumes:
      - ./frontend:/frontend

volumes:
  db_data: