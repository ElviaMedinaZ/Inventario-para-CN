services:
  db:
    image: mysql:8.0
    container_name: inventario_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: inventario_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./inventario_backup.sql:/docker-entrypoint-initdb.d/inventario_backup.sql

  backend:
    build: ./backend
    container_name: inventario_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: inventario_db
    depends_on:
      - db
    volumes:
      - ./frontend:/frontend

volumes:
  db_data: